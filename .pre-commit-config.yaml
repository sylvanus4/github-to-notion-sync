# Pre-commit hooks for GitHub to Notion Sync
# 간소화된 설정 - 핵심 품질 검사만 포함
# 설치: pip install pre-commit && pre-commit install
# 실행: pre-commit run --all-files

repos:
  # 기본 파일 검사 (필수만)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # 큰 파일 방지 (5MB)
      - id: check-added-large-files
        args: ["--maxkb=5120"]

      # YAML 문법 검사
      - id: check-yaml
        args: ["--unsafe"] # GitHub Actions YAML 지원
        exclude: ^deployment/

      # Merge conflict 마커 검사
      - id: check-merge-conflict

      # Private key 방지
      - id: detect-private-key

  # Python 코드 포맷팅 - Black (src만)
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.11
        args: ["--line-length=120"]
        files: ^src/

  # Python import 정렬 - isort (src만)
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length", "120"]
        files: ^src/

  # Python 린팅 - Ruff (src만)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      # Linter
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^src/
      # Formatter
      - id: ruff-format
        files: ^src/

  # Python 타입 체킹 - mypy는 CI에서만 실행 (pre-commit에서 제외)
  # GitHub Actions에서 continue-on-error: true로 실행됨

# Pre-commit 설정
default_language_version:
  python: python3.11

# 병렬 실행으로 속도 향상
default_stages: [commit]
fail_fast: false # 첫 에러에서 멈추지 않고 모든 검사 실행

# CI에서 사용할 때
ci:
  autofix_commit_msg: |
    chore: auto fixes from pre-commit hooks

    [pre-commit.ci] auto fixes from pre-commit.com hooks
  autofix_prs: true
  autoupdate_commit_msg: "chore: pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false
