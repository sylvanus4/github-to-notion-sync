# Pre-commit hooks for GitHub to Notion Sync
# 설치: pip install pre-commit && pre-commit install
# 실행: pre-commit run --all-files

repos:
  # 기본 파일 검사
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # 파일 끝 개행 추가
      - id: end-of-file-fixer
        exclude: \.json$
      
      # 공백 제거
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      
      # 큰 파일 방지 (5MB)
      - id: check-added-large-files
        args: ['--maxkb=5120']
      
      # YAML 문법 검사
      - id: check-yaml
        args: ['--unsafe']  # GitHub Actions YAML 지원
        exclude: ^deployment/
      
      # JSON 문법 검사
      - id: check-json
      
      # TOML 문법 검사
      - id: check-toml
      
      # Merge conflict 마커 검사
      - id: check-merge-conflict
      
      # Private key 방지
      - id: detect-private-key
      
      # Python 디버그 구문 검사
      - id: debug-statements
      
      # Case conflict 검사
      - id: check-case-conflict
      
      # Docstring 첫 줄 검사
      - id: check-docstring-first
      
      # 실행 가능한 Python 파일 shebang 검사
      - id: check-executables-have-shebangs
      
      # Shebang이 있는 파일 실행 권한 검사
      - id: check-shebang-scripts-are-executable

  # Python 코드 포맷팅 - Black
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.11
        args: ['--line-length=120']
        exclude: ^scripts/

  # Python import 정렬 - isort
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile', 'black', '--line-length', '120']
        exclude: ^scripts/

  # Python 린팅 - Ruff (flake8보다 빠름)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      # Linter
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: ^scripts/
      # Formatter
      - id: ruff-format
        exclude: ^scripts/

  # Python 타입 체킹 - mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - types-python-dateutil
          - types-PyYAML
        args: [--ignore-missing-imports, --no-strict-optional]
        exclude: ^(tests/|scripts/)

  # Python 보안 검사 - Bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml']
        additional_dependencies: ['bandit[toml]']
        exclude: ^tests/

  # Python docstring 검사
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: ['--convention=google', '--add-ignore=D100,D104']
        exclude: ^(tests/|scripts/)

  # Python 복잡도 검사
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=120', '--max-complexity=15', '--ignore=E203,W503,E501']
        exclude: ^(tests/|scripts/)

  # YAML 포맷팅
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.12.0
    hooks:
      - id: pretty-format-yaml
        args: [--autofix, --indent, '2']
        exclude: ^(.github/|deployment/|monitoring/)

  # Markdown 린팅
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        args: ['--fix']
        exclude: ^(PRD\.mdc|test_report\.md)

  # Dockerfile 린팅
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.1-beta
    hooks:
      - id: hadolint-docker
        args: ['--ignore', 'DL3008', '--ignore', 'DL3013']

  # Shell script 린팅
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  # Python requirements.txt 정렬
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [json, markdown]
        exclude: ^(database_analysis\.json|test_report\.md)

  # 커밋 메시지 검증 (Conventional Commits)
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict]

# Pre-commit 설정
default_language_version:
  python: python3.11

# 병렬 실행으로 속도 향상
default_stages: [commit]
fail_fast: false  # 첫 에러에서 멈추지 않고 모든 검사 실행

# CI에서 사용할 때
ci:
  autofix_commit_msg: |
    chore: auto fixes from pre-commit hooks
    
    [pre-commit.ci] auto fixes from pre-commit.com hooks
  autofix_prs: true
  autoupdate_commit_msg: 'chore: pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []  # 모든 훅 실행
  submodules: false

