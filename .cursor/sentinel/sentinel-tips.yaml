version: 1

general:
  - "Check MEMORY.md before making architectural decisions."
  - "Run tests before marking any phase complete."
  - "Evidence = file path + metric, not just 'looks good'."
  - "Use 'rtk' prefix on shell commands to reduce token usage."
  - "Commit after each completed mission for rollback safety."
  - "Never skip a phase -- the CLI will reject it anyway."
  - "If a mission fails twice, step back and reclassify the failure (Type 1/2/3)."
  - "Prefer composing existing skills over writing new analysis logic."
  - "Read KNOWN_ISSUES.md before debugging recurring failures."
  - "Update tasks/todo.md after completing missions -- audit trail matters."
  - "Keep mission outputs under outputs/ for traceability."
  - "The most recent context wins -- that's why this reminder exists."
  - "One mission at a time. Complete or fail before starting another."
  - "Phase dependencies exist for a reason -- don't try to shortcut."
  - "If evidence is hard to collect, the phase definition needs refinement."
  - "A blocked mission is not a failed mission -- it needs attention, not retry."
  - "Use --dry-run modes when available to avoid side effects."
  - "Check git status before and after each mission for clean state."
  - "Quantitative evidence (counts, scores, paths) > qualitative assertions."
  - "If you complete 3+ missions without finding issues, the bar may be too low."
  - "Cross-reference findings across missions -- data quality affects pipeline quality."
  - "Log everything. Future you will thank present you."
  - "The sentinel is only as good as its evidence requirements."
  - "When in doubt, add more evidence fields, not fewer."
  - "Review the mission-log.yaml periodically for trend analysis."
  - "A healthy project has missions completing regularly, not accumulating."
  - "If the same mission type fails repeatedly, the template needs revision."
  - "Don't modify sentinel-state.yaml directly -- always use the CLI."
  - "Each heartbeat should produce at least one actionable insight."
  - "The goal is continuous improvement, not perfection in one cycle."
  - "Stale data is worse than no data -- prioritize freshness checks."
  - "Security sweeps that find nothing are still valuable -- they prove vigilance."

project_health:
  - "Compare current lint error count with the previous cycle's count -- trend matters."
  - "Check for files modified in the last 24h but not covered by tests."
  - "TypeScript strict mode violations often indicate deeper design issues."
  - "Look for unused imports -- they accumulate silently."
  - "Backend and frontend health should be assessed independently."
  - "A quality score below 7/10 warrants immediate attention."
  - "Check if any services have degraded since the last health scan."
  - "Circular dependencies are architecture cancer -- catch them early."
  - "Monitor the ratio of production code to test code."
  - "Code complexity metrics (cyclomatic) predict bug density."
  - "Dead code paths increase maintenance burden without adding value."
  - "Check for TODO/FIXME comments older than 30 days."
  - "Error handling consistency is a leading indicator of reliability."
  - "Review the most-changed files -- high churn = high risk."
  - "A passing CI is necessary but not sufficient for health."

pipeline:
  - "Verify data freshness BEFORE running any analysis."
  - "Pipeline dry-run should complete without network calls."
  - "Check that all API endpoints respond within SLO thresholds."
  - "Compare today's pipeline output with yesterday's for drift detection."
  - "Stock data gaps compound -- a 1-day gap today is a 5-day gap next week."
  - "Quality gate scores below 7.0 should block Slack distribution."
  - "The pipeline is only as reliable as its weakest data source."
  - "Monitor Yahoo Finance API rate limits -- they change without notice."
  - "Backfill operations should be idempotent -- safe to retry."
  - "Pipeline stage failures should not cascade -- each stage should be independent."
  - "Check that report generation uses the latest analysis, not cached data."
  - "Validate that financial calculations produce sensible ranges."
  - "Pipeline metrics (duration, success rate) are evidence too."
  - "If the pipeline takes >10 min, profile for bottlenecks."
  - "Slack posting failures should not mark the pipeline as failed."

skill_ecosystem_growth:
  - "New skills should have clear Do NOT use boundaries."
  - "Skill trigger words must not overlap with existing skills."
  - "A skill without a command trigger is hard to discover."
  - "Merged skills should be tested against the original test cases."
  - "Skill quality audit CRITICAL findings must be fixed before shipping."
  - "Workflow patterns that appear 3+ times are candidates for skills."
  - "Check that new skills compose existing ones, not duplicate them."
  - "Skill descriptions must be under 1024 chars for Notion compatibility."
  - "Every new skill needs Korean trigger words too."
  - "After creating a skill, verify it appears in skill-orchestration.mdc."
  - "Skill evolution should be incremental -- big rewrites lose context."
  - "Test skill triggering with ambiguous prompts to check precision."
  - "Dead skills (never triggered in 30 days) should be reviewed."
  - "Skill metadata (version, author, category) enables ecosystem management."
  - "Cross-skill dependencies should be documented in the SKILL.md."

data_quality_patrol:
  - "Check for NaN/null values in price data -- they corrupt indicators."
  - "Stock splits cause apparent price drops -- verify adjusted close prices."
  - "Weekend gaps are normal; weekday gaps are data quality issues."
  - "KRX (Korean) and US markets have different trading calendars."
  - "KOSPI uses .KS, KOSDAQ uses .KQ for yfinance -- suffix matters."
  - "Compare DB record count with expected trading days."
  - "Financial statement data should be quarterly -- check for duplicates."
  - "Volume anomalies (0 or extreme spikes) often indicate data errors."
  - "Cross-validate prices between sources when possible."
  - "Data freshness for Korean stocks lags US by timezone offset."
  - "Backfill should never overwrite existing valid data."
  - "Check that new tickers from hot stock discovery have complete history."
  - "Delisted stocks should be flagged, not silently dropped."
  - "Currency-denominated data must specify the currency."
  - "Intraday data has different reliability than daily OHLCV."

security_dependency_sweep:
  - "Critical CVEs in production dependencies require same-day patches."
  - "Dev dependencies with CVEs are lower priority but still tracked."
  - "Secret detection must scan .env.example too -- patterns leak."
  - "Check that .gitignore covers all secret file patterns."
  - "Dependency update PRs should include changelog review."
  - "OWASP Top 10 changes annually -- keep the checklist current."
  - "Rate limiting and auth middleware are security controls, not just features."
  - "API keys in environment variables must have rotation schedules."
  - "Check for hardcoded localhost/debug URLs in production code."
  - "npm audit and pip-audit have different severity scales -- normalize."
  - "Transitive dependency CVEs are the sneakiest -- they hide deep."
  - "Security scan false positives should be documented, not ignored."
  - "Check that CORS configuration is not overly permissive."
  - "Review database connection strings for credential exposure."
  - "Supply chain attacks target build tools -- verify checksums."

test_coverage_patrol:
  - "Coverage percentage alone is misleading -- check branch coverage too."
  - "New features without tests should block the PR."
  - "E2E tests across 3 browsers catch CSS and rendering bugs."
  - "Mock-heavy tests prove less than integration tests."
  - "Flaky tests erode trust -- fix or quarantine them."
  - "Test naming should describe behavior, not implementation."
  - "Check that error paths are tested, not just happy paths."
  - "API endpoint tests should cover 4xx and 5xx responses."
  - "Frontend component tests should verify accessibility."
  - "Test data should be deterministic -- random data causes flakes."
  - "Playwright tests need the visibleContent helper for dual-outlet layouts."
  - "i18n test mocks return keys, not translated strings -- plan accordingly."
  - "Coverage gaps in services/ often indicate untested business logic."
  - "Tests that pass in isolation but fail together have shared state bugs."
  - "The best test is one that would have caught last week's bug."

doc_freshness_checker:
  - "MEMORY.md should reflect all major decisions from the last 7 days."
  - "API documentation drift is the most common staleness issue."
  - "README.md should accurately describe the current tech stack."
  - "Check that ADRs reference the correct status (proposed/accepted/superseded)."
  - "Inline code comments should match the current behavior."
  - "CONTRIBUTING.md must stay in sync with actual development workflow."
  - "Skill guide entries should exist for all installed skills."
  - "Documentation last-modified dates older than 90 days are suspect."
  - "Check for broken internal links in markdown files."
  - "Environmental setup docs are the first thing new devs hit -- keep fresh."
  - "API response schemas in docs should match actual Pydantic models."
  - "Deprecated features should be marked in docs, not silently removed."
  - "CHANGELOG should have entries for all user-visible changes."
  - "Check that example commands in docs actually run successfully."
  - "A doc without a date is a doc without trust."
