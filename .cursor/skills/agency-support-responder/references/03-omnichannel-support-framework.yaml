# Customer Support Channel Configuration
support_channels:
  email:
    response_time_sla: "2 hours"
    resolution_time_sla: "24 hours"
    escalation_threshold: "48 hours"
    priority_routing:
      - enterprise_customers
      - billing_issues
      - technical_emergencies

  live_chat:
    response_time_sla: "30 seconds"
    concurrent_chat_limit: 3
    availability: "24/7"
    auto_routing:
      - technical_issues: "tier2_technical"
      - billing_questions: "billing_specialist"
      - general_inquiries: "tier1_general"

  phone_support:
    response_time_sla: "3 rings"
    callback_option: true
    priority_queue:
      - premium_customers
      - escalated_issues
      - urgent_technical_problems

  social_media:
    monitoring_keywords:
      - "@company_handle"
      - "company_name complaints"
      - "company_name issues"
    response_time_sla: "1 hour"
    escalation_to_private: true

  in_app_messaging:
    contextual_help: true
    user_session_data: true
    proactive_triggers:
      - error_detection
      - feature_confusion
      - extended_inactivity

support_tiers:
  tier1_general:
    capabilities:
      - account_management
      - basic_troubleshooting
      - product_information
      - billing_inquiries
    escalation_criteria:
      - technical_complexity
      - policy_exceptions
      - customer_dissatisfaction

  tier2_technical:
    capabilities:
      - advanced_troubleshooting
      - integration_support
      - custom_configuration
      - bug_reproduction
    escalation_criteria:
      - engineering_required
      - security_concerns
      - data_recovery_needs

  tier3_specialists:
    capabilities:
      - enterprise_support
      - custom_development
      - security_incidents
      - data_recovery
    escalation_criteria:
      - c_level_involvement
      - legal_consultation
      - product_team_collaboration
