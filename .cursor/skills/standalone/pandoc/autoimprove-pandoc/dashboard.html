<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pandoc Skill Autoimprove Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;padding:24px}
h1{font-size:1.5rem;margin-bottom:4px}
.subtitle{color:#94a3b8;font-size:.85rem;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:#1e293b;border-radius:12px;padding:20px;text-align:center}
.card .label{font-size:.75rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em}
.card .value{font-size:2rem;font-weight:700;margin-top:4px}
.card .value.green{color:#22c55e}
.card .value.blue{color:#3b82f6}
.card .value.yellow{color:#eab308}
.card .value.red{color:#ef4444}
.chart-wrap{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:24px}
.chart-wrap h2{font-size:1rem;margin-bottom:12px}
canvas{max-height:260px}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #334155}
th{color:#94a3b8;font-weight:600;text-transform:uppercase;font-size:.7rem;letter-spacing:.05em}
.badge{display:inline-block;padding:2px 10px;border-radius:9999px;font-size:.75rem;font-weight:600}
.badge.keep{background:#166534;color:#86efac}
.badge.discard{background:#7f1d1d;color:#fca5a5}
.badge.baseline{background:#1e3a5f;color:#93c5fd}
.status-bar{background:#1e293b;border-radius:12px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:12px}
.status-dot{width:10px;height:10px;border-radius:50%}
.status-dot.running{background:#22c55e;animation:pulse 1.5s infinite}
.status-dot.complete{background:#3b82f6}
.status-dot.initializing{background:#eab308}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.eval-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.eval-bar .name{width:180px;font-size:.8rem;color:#cbd5e1}
.eval-bar .bar-bg{flex:1;height:16px;background:#334155;border-radius:8px;overflow:hidden}
.eval-bar .bar-fill{height:100%;border-radius:8px;transition:width .3s}
.eval-bar .pct{width:50px;text-align:right;font-size:.8rem;font-weight:600}
.section{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:24px}
.section h2{font-size:1rem;margin-bottom:16px}
</style>
</head>
<body>
<h1>Pandoc Skill Autoimprove</h1>
<p class="subtitle">Target: .cursor/skills/standalone/pandoc/SKILL.md &mdash; Auto-refreshes every 10s</p>

<div class="status-bar" id="statusBar">
  <div class="status-dot initializing" id="statusDot"></div>
  <span id="statusText">Initializing...</span>
</div>

<div class="grid">
  <div class="card"><div class="label">Baseline</div><div class="value blue" id="baselineVal">--</div></div>
  <div class="card"><div class="label">Best Score</div><div class="value green" id="bestVal">--</div></div>
  <div class="card"><div class="label">Current Exp</div><div class="value yellow" id="expVal">--</div></div>
  <div class="card"><div class="label">Improvement</div><div class="value" id="improvVal">--</div></div>
</div>

<div class="chart-wrap">
  <h2>Score Progression</h2>
  <canvas id="scoreChart"></canvas>
</div>

<div class="section">
  <h2>Per-Eval Breakdown</h2>
  <div id="evalBars"></div>
</div>

<div class="section">
  <h2>Experiment Log</h2>
  <table>
    <thead><tr><th>#</th><th>Score</th><th>Pass Rate</th><th>Status</th><th>Description</th></tr></thead>
    <tbody id="expTable"></tbody>
  </table>
</div>

<script>
let chart = null;
async function load() {
  try {
    const r = await fetch('results.json?t=' + Date.now());
    if (!r.ok) return;
    const d = await r.json();

    document.getElementById('statusDot').className = 'status-dot ' + d.status;
    document.getElementById('statusText').textContent =
      d.status === 'running' ? 'Running experiment ' + d.current_experiment + '...' :
      d.status === 'complete' ? 'Complete' : 'Initializing...';

    document.getElementById('baselineVal').textContent = d.baseline_score.toFixed(1) + '%';
    document.getElementById('bestVal').textContent = d.best_score.toFixed(1) + '%';
    document.getElementById('expVal').textContent = d.current_experiment;
    const imp = d.best_score - d.baseline_score;
    const impEl = document.getElementById('improvVal');
    impEl.textContent = (imp >= 0 ? '+' : '') + imp.toFixed(1) + '%';
    impEl.className = 'value ' + (imp > 0 ? 'green' : imp < 0 ? 'red' : 'yellow');

    const labels = d.experiments.map(e => '#' + e.id);
    const scores = d.experiments.map(e => e.pass_rate);
    const colors = d.experiments.map(e =>
      e.status === 'baseline' ? '#3b82f6' : e.status === 'keep' ? '#22c55e' : '#ef4444');

    if (chart) chart.destroy();
    const ctx = document.getElementById('scoreChart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Pass Rate %',
          data: scores,
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59,130,246,0.1)',
          tension: 0.3,
          fill: true,
          pointBackgroundColor: colors,
          pointRadius: 6,
          pointBorderWidth: 2,
          pointBorderColor: '#0f172a'
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { min: 0, max: 100, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
          x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
        },
        plugins: { legend: { display: false } }
      }
    });

    const barsHtml = (d.eval_breakdown || []).map(ev => {
      const pct = ev.total > 0 ? (ev.pass_count / ev.total * 100).toFixed(0) : 0;
      const color = pct >= 80 ? '#22c55e' : pct >= 50 ? '#eab308' : '#ef4444';
      return `<div class="eval-bar">
        <span class="name">${ev.name}</span>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <span class="pct" style="color:${color}">${pct}%</span>
      </div>`;
    }).join('');
    document.getElementById('evalBars').innerHTML = barsHtml;

    const rows = d.experiments.map(e =>
      `<tr><td>${e.id}</td><td>${e.score}/${e.max_score}</td><td>${e.pass_rate.toFixed(1)}%</td>
       <td><span class="badge ${e.status}">${e.status}</span></td><td>${e.description}</td></tr>`
    ).join('');
    document.getElementById('expTable').innerHTML = rows;
  } catch(e) { console.error('Dashboard load error:', e); }
}
load();
setInterval(load, 10000);
</script>
</body>
</html>
