# GitHub Projects v2 to Notion Database Field Mappings
# This file defines how GitHub Project fields map to Notion properties

github_to_notion:
  # Core Fields
  title:
    github_field: "title"
    notion_property: "작업"
    type: "title"
    required: true
  
  # github_node_id:
  #   github_field: "id"
  #   notion_property: "GitHub Node ID"
  #   type: "rich_text"
  #   required: true
  #   unique: true
  
  type:
    github_field: "__typename"
    notion_property: "태그"
    type: "multi_select"
    options:
      - "Issue"
      - "PullRequest" 
      - "DraftIssue"
  
  # Status Fields
  status:
    github_field: "Status"
    notion_property: "진행 상태"
    type: "select"
    options:
      - "Todo"
      - "In Progress" 
      - "Done"
      - "Cancelled"
  
  # Sprint/Iteration Fields (commented out - property doesn't exist in current database)
