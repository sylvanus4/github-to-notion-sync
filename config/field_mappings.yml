  #   options:
  #     - "Backlog"
  #     - "Current Sprint"
  #     - "Next Sprint"
  
  # Assignment Fields
  assignees:
    github_field: "Assignees"
    notion_property: "담당자"
    type: "people"
  
  # Priority Fields
  priority:
    github_field: "Priority"
    notion_property: "우선순위"
    type: "select"
    options:
      - "P0"
      - "P1"
      - "P2"
  
  # Date Fields
  due_date:
    github_field: "End date"
    notion_property: "마감일"
    type: "date"
  
  # GitHub Specific Fields (commented out - properties don't exist in current database)
