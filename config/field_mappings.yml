# GitHub Projects v2 to Notion Database Field Mappings
# Updated based on database analysis - focusing on working fields first
# This file defines how GitHub Project fields map to Notion properties

github_to_notion:
  # Core Fields
  title:
    github_field: "title"
    notion_property: "피드백 제목"
    type: "title"
    required: true
  
  # GitHub Node ID for duplicate checking
  id:
    github_field: "id"
    notion_property: "GitHub ID"
    type: "rich_text"
    required: true
  
  # Type mapping to tags (Issue/PR/Draft)
  type:
    github_field: "__typename"
    notion_property: "태그"
    type: "multi_select"
    value_mappings:
      "Issue": "ISSUE"
      "PullRequest": "PULL_REQUEST"
      "DraftIssue": "DRAFT_ISSUE"
  

  # Status Fields - GitHub 값에서 Notion 값으로 매핑 (사용자 요청에 따라)
  status:
    github_field: "Status"
    notion_property: "진행 상태"
    type: "status"
    value_mappings:
      "Epic": "시작 전"        # → not-started
      "Todo": "시작 전"        # → not-started  
      "In Progress": "진행 중"  # → in-progress
      "Done": "완료"           # → done
      "25-07-Archive": "보관"  # → archived
      "25-08-Archive": "보관"  # → archived (새로 추가)
    default_value: "시작 전"
  
  # Priority Fields - GitHub 값에서 Notion 값으로 매핑
  priority:
    github_field: "Priority"
    notion_property: "우선순위"
    type: "select"
    value_mappings:
      "P0": "높음"
      "P1": "중간" 
      "P2": "낮음"
      # 기본값이 없으면 null로 처리
    default_value: null
  
  # Date Fields
  due_date:
    github_field: "End date"
    notion_property: "마감일"
    type: "date"
    required: false

  # Estimate/Story Points Field
  estimate:
    github_field: "Estimate"
    notion_property: "스토리포인트"
    type: "number"
    required: false

  # People Fields - GitHub username에서 실제 Notion 사용자 ID로 매핑
  assignees:
    github_field: "Assignees"
    notion_property: "담당자"
    type: "people"
    value_mappings:
      "duyeol-yu": "229d872b-594c-8104-b58b-000212f60087"  # 유두열
      "jaehoonkim": "229d872b-594c-8150-879d-00022f27519e"  # 김재훈
      "sylvanus4": "229d872b-594c-816d-ae7c-0002f11615c0"  # HJ (한효정)
      "thaki-yakhyo": "23ed872b-594c-811f-8e2f-0002687c8ce2"  # yakhyo
      "thakicloud-jotaeyang": "229d872b-594c-81b5-906f-00020b52c301"  # 조태양
      "yunjae-park1111": "225d872b-594c-81ba-9e42-0002b46f091a"  # 박윤재
      "hwyncho-thakicloud": "245d872b-594c-814c-9657-000222886921"  # 조휘연
      "chohongcheol-thakicloud": "259d872b-594c-812e-9ea8-00028d08dc7d"  # 조홍철
      "jongmin-kim-thakicloud": "26bd872b-594c-81f8-98df-000226f169c0"  # 김종민
      "thakicloud-chanwoo": "26bd872b-594c-81fe-885e-00026a54788b"  # 신찬우
      "ryangkyung-thaki": "28bd872b-594c-81f1-8ff5-000283ca84b5"  # 강량경
      "mjhan-tk": "279d872b-594c-81cf-b503-0002c9451f49"  # 한민정

# Notion 전용 필드 (GitHub에서 매핑되지 않는 필드들)
notion_only_fields:
  - "하위 작업"
  - "상위 작업"
  - "후속 작업"
  - "선행 작업"

# 필드 매핑 설정
field_mapping_settings:
  # GitHub에서 값이 없는 경우 기본값 사용 여부
  use_default_values: true
  
  # 알 수 없는 값에 대한 처리
  handle_unknown_values: "skip"  # skip, error, default
  
  # 빈 문자열을 null로 처리할지 여부
  treat_empty_as_null: true

# Notion to GitHub Reverse Mappings (for future bidirectional sync)
notion_to_github:
  "피드백 제목": "title"
  "태그": "type"
  "진행 상태": "Status"
  "우선순위": "Priority"
  "마감일": "End date"
  "담당자": "Assignees"
  "우선순위": "Priority"
  "마감일": "End date"

# User Mappings (GitHub login to Notion user)
user_mappings:
  # Example mappings - these should be configured per organization
  # github_username: notion_user_id or email
  # "octocat": "octocat@example.com"
  # "developer1": "dev1@company.com"

# Webhook Event Mappings
webhook_events:
  projects_v2_item:
    actions:
      - "created"
      - "edited"
      - "deleted"
      - "restored"
      - "archived"
      - "converted"
  
  issues:
    actions:
      - "opened"
      - "edited"
      - "closed"
      - "reopened"
      - "assigned"
      - "unassigned"
      - "labeled"
      - "unlabeled"
  
  pull_request:
    actions:
      - "opened"
      - "edited"
      - "closed"
      - "reopened"
      - "assigned"
      - "unassigned"
      - "review_requested"
      - "ready_for_review"
      - "converted_to_draft"

# Sync Configuration
sync_config:
  rate_limits:
    notion_api: 3  # requests per second
    github_api: 5000  # requests per hour
  
  batch_size: 50  # reduced for better reliability
  retry_attempts: 3
  retry_delay: 1  # seconds
  
  # Full sync schedule
  full_sync_interval: "0 */6 * * *"  # every 6 hours
  
  # Backup configuration
  backup_enabled: true
  backup_schedule: "0 2 * * 0"  # weekly at 2 AM