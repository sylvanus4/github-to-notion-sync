# Notion to GitHub Reverse Mappings (for future bidirectional sync)
notion_to_github:
  "Task Name": "title"
  "GitHub Node ID": "id"
  "Status": "Status"
  "Sprint": "Sprint"
  "Priority": "Priority"
  "Assignees": "assignees"
  "Due Date": "Due Date"
  "Size": "Size"
  "Story Points": "Story Points"

# User Mappings (GitHub login to Notion user)
user_mappings:
  # Example mappings - these should be configured per organization
  # github_username: notion_user_id or email
  # "octocat": "octocat@example.com"
  # "developer1": "dev1@company.com"

# Webhook Event Mappings
webhook_events:
  projects_v2_item:
    actions:
      - "created"
      - "edited"
      - "deleted"
      - "restored"
      - "archived"
      - "converted"
  
  issues:
    actions:
      - "opened"
      - "edited"
      - "closed"
      - "reopened"
      - "assigned"
      - "unassigned"
      - "labeled"
      - "unlabeled"
  
  pull_request:
    actions:
      - "opened"
      - "edited"
      - "closed"
      - "reopened"
      - "assigned"
      - "unassigned"
      - "review_requested"
      - "ready_for_review"
      - "converted_to_draft"

# Sync Configuration
sync_config:
  rate_limits:
    notion_api: 3  # requests per second
    github_api: 5000  # requests per hour
  
  batch_size: 100  # items per batch
  retry_attempts: 3
  retry_delay: 1  # seconds
  
  # Full sync schedule
  full_sync_interval: "0 */6 * * *"  # every 6 hours
  
  # Backup configuration
  backup_enabled: true
  backup_schedule: "0 2 * * 0"  # weekly at 2 AM