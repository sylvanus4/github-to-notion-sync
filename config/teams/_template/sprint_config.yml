# Team Configuration Template
# 새 팀을 추가하려면 이 파일을 복사하여 config/teams/{team-id}/sprint_config.yml 으로 저장하세요.
#
# 사용법:
# 1. cp config/teams/_template/sprint_config.yml config/teams/{team-id}/sprint_config.yml
# 2. {team-id}를 팀 식별자로 변경 (예: cloud-infra, security)
# 3. 아래 값들을 팀에 맞게 수정
# 4. (선택) field_mappings.yml 파일 추가 (팀별 사용자 매핑 필요 시)

# 팀 기본 정보
team:
  id: "{team-id}"           # 고유 식별자 (소문자, 숫자, 하이픈만 허용)
  name: "{Team Name}"       # 표시 이름
  description: "{팀 설명}"
  enabled: true             # false로 설정하면 동기화에서 제외

# GitHub 연결 설정
# 토큰은 환경변수 GH_TOKEN 사용 (GitHub Secrets에서 관리)
github:
  org: "ThakiCloud"         # GitHub Organization 이름
  project_number: 0         # GitHub Projects v2 번호 (필수)

# Notion 연결 설정
# 토큰은 환경변수 NOTION_TOKEN 사용 (GitHub Secrets에서 관리)
notion:
  # 메인 동기화 데이터베이스 ID
  # 환경변수 NOTION_DB_ID_{TEAM_ID} 로 오버라이드 가능
  # database_id: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# 스프린트 설정
sprint:
  # 현재 스프린트 (매주 업데이트)
  # 형식: {YY}-{MM}-Sprint{N}
  current: "25-12-Sprint1"
  
  # PR-Checker 노션 페이지 ID
  # PR 리뷰 체크, 스프린트 통계 페이지가 생성되는 부모 페이지
  notion_parent_id: ""
  
  # SprintChecker 노션 페이지 ID
  # 스프린트 요약 페이지가 생성되는 부모 페이지
  sprint_checker_parent_id: ""
  
  # DailyScrum 노션 페이지 ID
  # 데일리 스크럼 페이지가 생성되는 부모 페이지
  daily_scrum_parent_id: ""
  
  # QA 이슈 데이터베이스 ID (선택)
  # 레이블에 'qa', '품질', 'bug' 포함된 이슈가 동기화됨
  # qa_database_id: ""

# 참고:
# - 팀별 필드 매핑이 필요한 경우 같은 디렉토리에 field_mappings.yml 파일 추가
# - field_mappings.yml이 없으면 공통 config/field_mappings.yml 사용
# - 사용자 매핑(GitHub username → Notion user ID)은 field_mappings.yml에 정의

