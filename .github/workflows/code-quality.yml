name: Code Quality Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # pre-commit에 필요

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pre-commit

    - name: Cache pre-commit environments
      uses: actions/cache@v3
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: |
          pre-commit-${{ runner.os }}-

    - name: Run pre-commit
      run: |
        pre-commit run --all-files --show-diff-on-failure

    - name: Annotate errors
      if: failure()
      run: |
        echo "::error::Pre-commit checks failed. Run 'make pre-commit' locally to fix."

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run Ruff
      run: |
        ruff check src/ tests/ --output-format=github

    - name: Run mypy
      run: |
        mypy src/ --show-error-codes
      continue-on-error: true  # mypy는 warning으로 처리

    - name: Run Bandit (Security)
      run: |
        bandit -r src/ -c pyproject.toml -f json -o bandit-report.json
        bandit -r src/ -c pyproject.toml
      continue-on-error: true

    - name: Upload Bandit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bandit-security-report
        path: bandit-report.json
        retention-days: 30

  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run tests with coverage
      env:
        # 테스트에 필요한 더미 환경 변수
        GH_TOKEN: "dummy-token"
        NOTION_TOKEN: "dummy-token"
        GH_ORG: "dummy-org"
        GH_PROJECT_NUMBER: "1"
        NOTION_DB_ID: "dummy-db-id"
        GH_WEBHOOK_SECRET: "dummy-secret"
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  code-quality-summary:
    name: Code Quality Summary
    runs-on: ubuntu-latest
    needs: [pre-commit, lint, test]
    if: always()

    steps:
    - name: Check results
      run: |
        if [[ "${{ needs.pre-commit.result }}" == "failure" ]] || \
           [[ "${{ needs.lint.result }}" == "failure" ]] || \
           [[ "${{ needs.test.result }}" == "failure" ]]; then
          echo "::error::One or more code quality checks failed"
          exit 1
        fi
        echo "✅ All code quality checks passed!"
