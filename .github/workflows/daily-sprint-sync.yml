name: Daily Sprint Sync

on:
  schedule:
    # 한국 시간 오전 9시 = UTC 0시 (KST = UTC+9)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      sprint_filter:
        description: 'Sprint filter (e.g., 25-10-Sprint4) - 비워두면 config/sprint_config.yml의 값 사용'
        required: false
        type: string
      notion_parent_id:
        description: 'Notion parent page ID - 비워두면 config/sprint_config.yml의 값 사용'
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Load sprint config
      id: config
      run: |
        # config/sprint_config.yml에서 설정 읽기
        SPRINT=$(grep '^current_sprint:' config/sprint_config.yml | awk '{print $2}' | tr -d '"')
        NOTION_ID=$(grep '^notion_parent_id:' config/sprint_config.yml | awk '{print $2}' | tr -d '"')
        echo "default_sprint=${SPRINT}" >> $GITHUB_OUTPUT
        echo "default_notion_id=${NOTION_ID}" >> $GITHUB_OUTPUT
        echo "📋 Config loaded - Sprint: ${SPRINT}, Notion ID: ${NOTION_ID}"
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Set environment variables
      run: |
        # 수동 입력값이 있으면 우선, 없으면 config 파일 값 사용
        SPRINT="${{ github.event.inputs.sprint_filter }}"
        NOTION_ID="${{ github.event.inputs.notion_parent_id }}"
        
        if [ -z "$SPRINT" ]; then
          SPRINT="${{ steps.config.outputs.default_sprint }}"
        fi
        
        if [ -z "$NOTION_ID" ]; then
          NOTION_ID="${{ steps.config.outputs.default_notion_id }}"
        fi
        
        echo "SPRINT_FILTER=${SPRINT}" >> $GITHUB_ENV
        echo "NOTION_PARENT_ID=${NOTION_ID}" >> $GITHUB_ENV
        echo "✅ Using Sprint: ${SPRINT}, Notion ID: ${NOTION_ID}"
    
    - name: Run complete resync
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        GITHUB_OWNER: ${{ secrets.GITHUB_OWNER }}
        GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
        GITHUB_PROJECT_NUMBER: ${{ secrets.GITHUB_PROJECT_NUMBER }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      run: |
        PYTHONPATH=. python scripts/complete_resync.py --sprint-filter "${{ env.SPRINT_FILTER }}" --force
        
    - name: Run sprint PR review check
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        GITHUB_OWNER: ${{ secrets.GITHUB_OWNER }}
        GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
        GITHUB_PROJECT_NUMBER: ${{ secrets.GITHUB_PROJECT_NUMBER }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      run: |
        PYTHONPATH=. python scripts/sprint_pr_review_check.py --sprint "${{ env.SPRINT_FILTER }}" --notion-parent-id "${{ env.NOTION_PARENT_ID }}"
        
    - name: Run sprint stats
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        GITHUB_OWNER: ${{ secrets.GITHUB_OWNER }}
        GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
        GITHUB_PROJECT_NUMBER: ${{ secrets.GITHUB_PROJECT_NUMBER }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      run: |
        PYTHONPATH=. python scripts/sprint_stats.py --sprint "${{ env.SPRINT_FILTER }}" --notion-parent-id "${{ env.NOTION_PARENT_ID }}"
        
    - name: Upload artifacts (if any)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sprint-sync-logs
        path: |
          *.log
          *.json
        retention-days: 7
        if-no-files-found: ignore

